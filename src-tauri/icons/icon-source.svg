<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Nexa Markdown Viewer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#16233f"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="md" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
  </defs>

  <!-- 투명 캔버스 1024, 아트워크는 macOS 표준 여백(약 96px)을 두고 832 본체로 -->
  <g transform="translate(96,96) scale(0.8125)">
    <!-- 본체(둥근 사각형) -->
    <rect x="0" y="0" width="1024" height="1024" rx="228" fill="url(#bg)"/>

    <!-- 배경의 큰 S (SosomLab) -->
    <text x="500" y="800" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
          font-size="1080" font-weight="800" fill="url(#s)" text-anchor="middle" opacity="0.92">S</text>

    <!-- 우상단 1/4 정사각: M↓ 배지 -->
    <rect x="540" y="40" width="444" height="444" rx="96" fill="#0d1117" stroke="#30363d" stroke-width="6"/>
    <text x="762" y="392" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="300" font-weight="700" fill="url(#md)" text-anchor="middle">M↓</text>
  </g>
</svg>
