# .github/workflows/release.yml
name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # Release 생성/업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # pnpm 버전은 package.json 의 "packageManager"(pnpm@11)를 따른다
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexa Markdown Viewer ${{ github.ref_name }}'
          releaseBody: |
            OS에 맞는 설치 파일을 받으세요. (macOS: `.dmg` · Windows: `-setup.exe`)

            > ⚠️ **아직 코드 서명되지 않았습니다.** 첫 실행 시 보안 경고가 나올 수 있습니다.
            > - macOS: 앱 **우클릭 → 열기** (또는 `xattr -dr com.apple.quarantine <앱>`)
            > - Windows: SmartScreen **추가 정보 → 실행**

            변경사항은 [CHANGELOG.md](https://github.com/kiros33/sosomlab-nexa-viewer/blob/main/CHANGELOG.md) 참고.
          releaseDraft: true       # 검토 후 게시 (자동 게시하려면 false)
          prerelease: false
          args: ${{ matrix.args }}
