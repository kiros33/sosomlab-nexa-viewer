# .github/workflows/release.yml
name: release
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # Release 생성/업로드 권한

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      # pnpm 버전은 package.json 의 "packageManager"(pnpm@11)를 따른다
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Nexa Markdown Viewer ${{ github.ref_name }}'
          releaseBody: '아래 자산에서 OS에 맞는 설치 파일을 받으세요.'
          releaseDraft: true       # 검토 후 게시 (자동 게시하려면 false)
          prerelease: false
          args: ${{ matrix.args }}
