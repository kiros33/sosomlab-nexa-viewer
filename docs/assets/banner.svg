<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="Nexa Markdown Viewer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2f81f7"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="6" fill="url(#accent)"/>

  <!-- markdown glyph badge -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="120" height="120" rx="22" fill="#161b22" stroke="#30363d" stroke-width="2"/>
    <text x="60" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="64" font-weight="700" fill="url(#accent)" text-anchor="middle">M↓</text>
  </g>

  <!-- title -->
  <text x="250" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="58" font-weight="800" fill="#e6edf3">Nexa Markdown Viewer</text>
  <text x="252" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#8b949e">GitHub 스타일 Markdown 뷰어 · 로컬 · 다중 저장소 · 확장 가능한 렌더링</text>

  <!-- chips -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#adbac7">
    <g transform="translate(252,212)">
      <rect width="92" height="32" rx="16" fill="#21262d" stroke="#30363d"/>
      <text x="46" y="21" text-anchor="middle">Tauri 2</text>
    </g>
    <g transform="translate(356,212)">
      <rect width="92" height="32" rx="16" fill="#21262d" stroke="#30363d"/>
      <text x="46" y="21" text-anchor="middle">React 19</text>
    </g>
    <g transform="translate(460,212)">
      <rect width="110" height="32" rx="16" fill="#21262d" stroke="#30363d"/>
      <text x="55" y="21" text-anchor="middle">TypeScript</text>
    </g>
    <g transform="translate(582,212)">
      <rect width="148" height="32" rx="16" fill="#21262d" stroke="#30363d"/>
      <text x="74" y="21" text-anchor="middle">Windows · macOS</text>
    </g>
  </g>

  <text x="1120" y="270" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="#6e7681" text-anchor="end">by SosomLab</text>
</svg>
