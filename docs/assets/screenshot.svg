<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="740" viewBox="0 0 1200 740" role="img" aria-label="Nexa Markdown Viewer UI 미리보기">
  <defs>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
    <clipPath id="win"><rect x="10" y="10" width="1180" height="720" rx="12"/></clipPath>
  </defs>

  <rect width="1200" height="740" fill="#010409"/>
  <g clip-path="url(#win)">
    <rect x="10" y="10" width="1180" height="720" fill="#0d1117"/>

    <!-- title bar -->
    <rect x="10" y="10" width="1180" height="36" fill="#161b22"/>
    <circle cx="34" cy="28" r="6" fill="#ff5f57"/>
    <circle cx="54" cy="28" r="6" fill="#febc2e"/>
    <circle cx="74" cy="28" r="6" fill="#28c840"/>
    <text x="600" y="33" text-anchor="middle" class="ui" font-size="13" fill="#8b949e">Nexa Markdown Viewer</text>

    <!-- toolbar -->
    <rect x="10" y="46" width="1180" height="40" fill="#161b22"/>
    <line x1="10" y1="86" x2="1190" y2="86" stroke="#30363d"/>
    <g class="ui" font-size="13" fill="#c9d1d9">
      <rect x="24" y="55" width="96" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="72" y="71" text-anchor="middle">📂 폴더 열기</text>
      <rect x="128" y="55" width="96" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="176" y="71" text-anchor="middle">📄 파일 열기</text>

      <text x="600" y="71" text-anchor="middle" font-weight="600" fill="#8b949e">guide.md</text>

      <text x="880" y="71" text-anchor="end" font-size="12" fill="#8b949e">렌더링</text>
      <rect x="888" y="55" width="96" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="900" y="71">GitHub ▾</text>
      <rect x="992" y="55" width="58" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="1021" y="71" text-anchor="middle">⬇ HTML</text>
      <rect x="1058" y="55" width="54" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="1085" y="71" text-anchor="middle">⬇ PDF</text>
      <rect x="1120" y="55" width="34" height="24" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="1137" y="71" text-anchor="middle">🌙</text>
    </g>

    <!-- sidebar (file tree) -->
    <rect x="10" y="86" width="240" height="644" fill="#161b22"/>
    <line x1="250" y1="86" x2="250" y2="730" stroke="#30363d"/>
    <text x="26" y="110" class="ui" font-size="11" fill="#6e7681" font-weight="700">SOSOMLAB-NEXA-VIEWER</text>
    <g class="ui" font-size="13" fill="#c9d1d9">
      <text x="30" y="138">▾ 📁 docs</text>
      <rect x="40" y="148" width="200" height="22" rx="5" fill="#163056"/>
      <text x="52" y="163" fill="#e6edf3" font-weight="600">📄 guide.md</text>
      <text x="52" y="187">📄 install.md</text>
      <text x="52" y="211">📄 faq.md</text>
      <text x="30" y="237">▸ 📁 examples</text>
      <text x="30" y="261">📄 README.md</text>
      <text x="30" y="285">📄 CHANGELOG.md</text>
    </g>

    <!-- history bar -->
    <rect x="250" y="86" width="940" height="40" fill="#161b22"/>
    <line x1="250" y1="126" x2="1190" y2="126" stroke="#30363d"/>
    <g class="ui" font-size="13">
      <rect x="266" y="95" width="30" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="281" y="110" text-anchor="middle" fill="#c9d1d9">←</text>
      <rect x="300" y="95" width="30" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="315" y="110" text-anchor="middle" fill="#6e7681">→</text>

      <text x="344" y="111" fill="#8b949e">README.md</text>
      <text x="430" y="111" fill="#6e7681">›</text>
      <text x="444" y="111" fill="#8b949e">install.md#요구사항</text>
      <text x="588" y="111" fill="#6e7681">›</text>
      <text x="602" y="111" class="mono" fill="#e6edf3" font-weight="600">#빠른-시작</text>

      <rect x="1086" y="95" width="88" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
      <text x="1130" y="110" text-anchor="middle" fill="#c9d1d9">▾ 기록 (3)</text>
    </g>

    <!-- content (rendered markdown) -->
    <g class="ui" fill="#e6edf3">
      <text x="286" y="172" font-size="28" font-weight="800">guide.md</text>
      <line x1="286" y1="186" x2="956" y2="186" stroke="#21262d"/>
      <text x="286" y="214" font-size="15" fill="#c9d1d9">로컬과 원격 저장소의 Markdown을 GitHub 스타일로 읽는 데스크톱 뷰어.</text>

      <text x="286" y="252" font-size="20" font-weight="700">빠른 시작</text>
      <line x1="286" y1="262" x2="956" y2="262" stroke="#21262d"/>

      <!-- code block -->
      <rect x="286" y="278" width="670" height="78" rx="8" fill="#161b22" stroke="#30363d"/>
      <text x="302" y="304" class="mono" font-size="13"><tspan fill="#ff7b72">pnpm</tspan><tspan fill="#c9d1d9"> install</tspan></text>
      <text x="302" y="326" class="mono" font-size="13"><tspan fill="#ff7b72">pnpm</tspan><tspan fill="#c9d1d9"> tauri dev   </tspan><tspan fill="#8b949e"># 개발 실행</tspan></text>
      <text x="302" y="348" class="mono" font-size="13"><tspan fill="#ff7b72">pnpm</tspan><tspan fill="#c9d1d9"> tauri build </tspan><tspan fill="#8b949e"># 배포 빌드</tspan></text>

      <!-- table -->
      <text x="286" y="394" font-size="20" font-weight="700">지원 기능</text>
      <line x1="286" y1="404" x2="956" y2="404" stroke="#21262d"/>
      <g font-size="13">
        <rect x="286" y="418" width="335" height="30" fill="#161b22" stroke="#30363d"/>
        <rect x="621" y="418" width="335" height="30" fill="#161b22" stroke="#30363d"/>
        <text x="300" y="438" font-weight="700">기능</text>
        <text x="635" y="438" font-weight="700">상태</text>
        <rect x="286" y="448" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <rect x="621" y="448" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <text x="300" y="468" fill="#c9d1d9">GFM · 코드 하이라이팅</text>
        <text x="635" y="468" fill="#7ee787">✓ 지원</text>
        <rect x="286" y="478" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <rect x="621" y="478" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <text x="300" y="498" fill="#c9d1d9">목차(ToC) · 이동 기록</text>
        <text x="635" y="498" fill="#7ee787">✓ 지원</text>
        <rect x="286" y="508" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <rect x="621" y="508" width="335" height="30" fill="#0d1117" stroke="#30363d"/>
        <text x="300" y="528" fill="#c9d1d9">HTML · PDF 내보내기</text>
        <text x="635" y="528" fill="#7ee787">✓ 지원</text>
      </g>

      <!-- callout / blockquote -->
      <rect x="286" y="556" width="670" height="52" rx="6" fill="#161b22"/>
      <rect x="286" y="556" width="4" height="52" fill="#2f81f7"/>
      <text x="306" y="580" font-size="13" fill="#58a6ff" font-weight="700">ℹ NOTE</text>
      <text x="306" y="598" font-size="13" fill="#c9d1d9">GitHub 원격 저장소와 수식·다이어그램은 로드맵에 따라 추가됩니다.</text>
    </g>

    <!-- toc panel -->
    <rect x="956" y="126" width="234" height="604" fill="#161b22"/>
    <line x1="956" y1="126" x2="956" y2="730" stroke="#30363d"/>
    <text x="972" y="150" class="ui" font-size="11" fill="#6e7681" font-weight="700">목차</text>
    <g class="ui" font-size="12">
      <text x="972" y="176" fill="#58a6ff">빠른 시작</text>
      <text x="972" y="200" fill="#8b949e">지원 기능</text>
      <text x="984" y="224" fill="#8b949e">설치</text>
      <text x="984" y="248" fill="#8b949e">빌드</text>
      <text x="972" y="272" fill="#8b949e">로드맵</text>
    </g>
  </g>

  <rect x="10" y="10" width="1180" height="720" rx="12" fill="none" stroke="#30363d" stroke-width="1.5"/>
</svg>
